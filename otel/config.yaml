receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 256
  batch: {}

exporters:
  debug:
    verbosity: basic
  # Operator uncomments and configures one of these to fan out to a backend:
  # otlp/tempo:
  #   endpoint: tempo:4317
  #   tls:
  #     insecure: true
  # prometheus:
  #   endpoint: 0.0.0.0:8889
  # otlphttp/loki:
  #   endpoint: http://loki:3100/otlp

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
