---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forge-otel-collector-config
  namespace: forge-system
  labels:
    app.kubernetes.io/name: forge-otel-collector
    app.kubernetes.io/part-of: forge-platform
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      memory_limiter:
        check_interval: 5s
        limit_mib: 256
      batch: {}
    exporters:
      debug:
        verbosity: basic
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-otel-collector
  namespace: forge-system
  labels:
    app.kubernetes.io/name: forge-otel-collector
    app.kubernetes.io/part-of: forge-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forge-otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forge-otel-collector
        app.kubernetes.io/part-of: forge-platform
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:latest
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/otel
              readOnly: true
          resources:
            limits:
              memory: 512Mi
              cpu: 500m
            requests:
              memory: 128Mi
              cpu: 50m
      volumes:
        - name: config
          configMap:
            name: forge-otel-collector-config
            items:
              - key: config.yaml
                path: config.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: forge-otel-collector
  namespace: forge-system
  labels:
    app.kubernetes.io/name: forge-otel-collector
    app.kubernetes.io/part-of: forge-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: forge-otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
